name: claude-pr-review
# Thin caller — ADR-0018. The workflow logic lives in the platform repo's
# reusable: jaetill/agentic-dev-environment/.github/workflows/claude-pr-review.yml
# Do NOT inline logic here — inlined copies are the drift ADR-0018 eliminates.
# To change review behavior, edit the reusable in the platform repo.
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
jobs:
  review:
    uses: jaetill/agentic-dev-environment/.github/workflows/claude-pr-review.yml@92e77b917bebb7bc274c219b410e40d5611d42fd
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
