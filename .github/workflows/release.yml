name: release
# Thin caller (ADR-0018) - the release flow lives in the platform reusable:
# jaetill/agentic-dev-environment/.github/workflows/release.yml
# Do NOT inline release-please here; edit the reusable instead.
# The reusable mints a fleet App token (FLEET_APP_ID / FLEET_APP_PRIVATE_KEY
# repo secrets) so the release PR triggers its review checks; absent secrets
# it falls back to GITHUB_TOKEN (PR created but check-less).

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    # First-party reusable rides @main so platform fixes propagate (ADR-0048/0034) —
    # don't pin to a SHA.
    uses: jaetill/agentic-dev-environment/.github/workflows/release.yml@main
    with:
      release-type: node
    # The release reusable declares no `secrets:` block — its contract is
    # `secrets: inherit` (it reads secrets.FLEET_APP_* directly). Passing explicit
    # named secrets it doesn't declare is rejected at startup (#64). Release is
    # push-on-main (not a prompt-injection surface), so inherit is the sanctioned
    # pattern here, matching the rest of the fleet's release callers.
    secrets: inherit
