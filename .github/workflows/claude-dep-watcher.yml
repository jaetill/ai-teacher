name: claude-dep-watcher
# Thin caller (ADR-0018 / ADR-0045) - dep-watch lives in the platform reusable:
# jaetill/agentic-dev-environment/.github/workflows/dep-watch.yml
# The reusable runs the LLM agent read-only and publishes the rolling report
# via a separate deterministic job (writer != publisher).

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write # ceiling for the reusable's publish job; generate job downgrades to read
  id-token: write # required: reusable generate job uses OIDC for claude-code-action
  # issues: write intentionally absent — ADR-0045 retired digest issues;
  # the reusable publishes findings via git commit to reports/dep-watch, not GitHub Issues.

jobs:
  dep-watch:
    # Pinned to SHA: id-token:write grants OIDC minting; pinning prevents an
    # unpinned @main reusable from silently acquiring cloud-credential access.
    # Bump this SHA when pulling in platform reusable updates.
    uses: jaetill/agentic-dev-environment/.github/workflows/dep-watch.yml@1f20401c1f8b1badfc4c1e4ac1b42bc313131405
    secrets: inherit
